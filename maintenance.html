<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance | Actogin Group</title>

  <!-- SAME CSS as your site -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/theme.css">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      text-align: center;

      /* SAME animated gradient as hero */
      background: linear-gradient(270deg,#1b5e20,#2e7d32,#43a047,#2e7d32);
      background-size: 600% 600%;
      animation: heroGradientMove 12s ease infinite;

      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .maintenance-box {
      max-width: 600px;
      padding: 40px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
      animation: floatLogo 4s ease-in-out infinite;
    }

    h1 {
      font-weight: 800;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.9;
    }

    .btn-main {
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 8px;
      background: linear-gradient(270deg,#1b5e20,#2e7d32,#43a047);
      border: none;
      color: #fff;
    }

    .btn-main:hover {
      transform: translateY(-3px);
    }

    @keyframes heroGradientMove {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    @keyframes floatLogo {
      50% { transform: translateY(-8px); }
    }
  </style>
</head>

<body>

  <div class="maintenance-box">
    <img src="assets/images/uploads/act logo.png" class="logo" alt="Logo">

    <h1>We’re Upgrading 🚧</h1>

    <p>
      Actogin Group Investments is currently undergoing maintenance<br>
      to improve your experience.
    </p>

    <p class="mt-2">
      Please check back shortly.
    </p>

    <a href="index.html" class="btn btn-main">
      <i class="bi bi-arrow-clockwise"></i> Try Again
    </a>
  </div>

</body>
</html>
