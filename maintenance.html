<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Your main CSS -->
  <link rel="stylesheet" href="./assets/css/style.css">

  <!-- Optional Bootstrap if you use it -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0f172a;
      color: #fff;
      text-align: center;
      font-family: inherit;
    }

    .maintenance-box {
      max-width: 600px;
      padding: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
    }

    p {
      opacity: 0.8;
    }

    .btn-home {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="maintenance-box">
    <h1>🚧 We’re Under Maintenance</h1>
    <p>
      We’re currently improving the platform to serve you better.<br>
      Please check back shortly.
    </p>

    <a href="./index.html" class="btn btn-primary btn-home">
      Try Again
    </a>
  </div>

</body>
</html>
