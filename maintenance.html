<!-- maintenance.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .message {
            background-color: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>We'll be back soon!</h1>
    <p>Our website is currently under maintenance. Please check back later.</p>
    <div class="message">
        <p>We appreciate your patience!</p>
    </div>
    <p id="maintenance-message">We'll be back soon.</p>

<script>
  const msg = sessionStorage.getItem('maintenanceMessage');
  if (msg) {
    document.getElementById('maintenance-message').textContent = msg;
  }
</script>
</body>
</html>
